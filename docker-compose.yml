services:
  # Local Redis container acting as our local Upstash mirror
  redis-local:
    image: redis:7.2-alpine
    container_name: headsntails_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Run with Append Only File (AOF) enabled to mirror production durability
    command: redis-server --appendonly yes

volumes:
  redis_data: