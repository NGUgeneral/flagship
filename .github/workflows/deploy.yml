name: Continuous Integration (Flagship Engine)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build Verification & Lint
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the source code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up native Go environment to run unit tests
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.3'

    # 3. Execute native test suite locally on the runner
    - name: Run Unit Tests
      run: |
        go test -v -race ./...

    # 4. Verify the Dockerfile builds cleanly as a final sanity check
    - name: Test Local Docker Build
      run: |
        docker build -t flagship-engine:test .